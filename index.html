<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Подслушано - Панель управления</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <div class="header">
            <h1>🔧 Подслушано</h1>
            <p class="subtitle">Панель администратора</p>
        </div>

        <!-- Навигация -->
        <div class="tabs">
            <button class="tab active" onclick="showTab('dashboard')">📊</button>
            <button class="tab" onclick="showTab('moderation')">📨</button>
            <button class="tab" onclick="showTab('users')">👥</button>
            <button class="tab" onclick="showTab('settings')">⚙️</button>
        </div>

        <!-- Контент -->
        <div id="dashboard" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="todayPosts">0</div>
                    <div class="stat-label">Постов сегодня</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="pendingCount">0</div>
                    <div class="stat-label">В очереди</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalUsers">0</div>
                    <div class="stat-label">Пользователей</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalPosts">0</div>
                    <div class="stat-label">Всего постов</div>
                </div>
            </div>

            <div class="mode-info" id="modeInfo">
                <span id="modeIcon">☀️</span>
                <span id="modeText">Автоматический режим</span>
                <span id="intervalText">(5 мин)</span>
            </div>

            <div class="section">
                <h2>📋 Последние действия</h2>
                <div id="recentActions" class="actions-list">
                    Загрузка...
                </div>
            </div>
        </div>

        <div id="moderation" class="tab-content">
            <div class="section">
                <h2>📨 Очередь модерации</h2>
                <div id="pendingMessages" class="messages-list">
                    Загрузка...
                </div>
            </div>
        </div>

        <div id="users" class="tab-content">
            <div class="section">
                <h2>👥 Пользователи</h2>
                <input type="text" id="userSearch" placeholder="Поиск по ID или username..." class="search-input">
                <button onclick="searchUser()" class="btn btn-primary">🔍 Найти</button>
                <div id="userResult" class="user-card"></div>
            </div>
        </div>

        <div id="settings" class="tab-content">
            <div class="section">
                <h2>⚙️ Настройки</h2>
                <div class="setting-item">
                    <span>🌙 Ночной режим</span>
                    <label class="switch">
                        <input type="checkbox" id="nightMode" onchange="toggleSetting('night_mode')">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span>☀️ Авто-режим</span>
                    <label class="switch">
                        <input type="checkbox" id="autoMode" onchange="toggleSetting('auto_mode')">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span>🛠 Техработы</span>
                    <label class="switch">
                        <input type="checkbox" id="maintenance" onchange="toggleSetting('maintenance')">
                        <span class="slider"></span>
                    </label>
                </div>
                <button onclick="loadSettings()" class="btn btn-secondary">🔄 Обновить настройки</button>
            </div>
        </div>

        <!-- Уведомления -->
        <div id="notification" class="notification hidden"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
